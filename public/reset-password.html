<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور - مركز بداية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            direction: rtl;
            background: #0f172a;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #4f46e5, #7c3aed);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #4338ca, #6d28d9);
        }
        input:focus {
            outline: none;
        }
        input:focus-visible {
            outline: 2px solid #4f46e5;
            outline-offset: 2px;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        /* Password toggle styles */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-left: 2.5rem;
        }
        .password-toggle {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.3s ease;
            background: none;
            border: none;
            font-size: 1.1rem;
        }
        .password-toggle:hover {
            color: #e2e8f0;
        }
        /* Step indicator */
        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .step-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }
        .step-dot.active {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            box-shadow: 0 0 20px rgba(79,70,229,0.3);
        }
        .step-dot.inactive {
            background: rgba(30, 41, 59, 0.5);
            color: #94a3b8;
            border: 1px solid rgba(79,70,229,0.2);
        }
        .step-dot.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .step-line {
            width: 50px;
            height: 2px;
            background: rgba(79,70,229,0.2);
            transition: background 0.3s ease;
        }
        .step-line.completed {
            background: #34d399;
        }
        .step-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .step-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="glass-card p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-block p-3 rounded-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-3xl mb-4">
                    <i class="fas fa-key"></i>
                </div>
                <h1 class="text-3xl font-bold text-white">مركز بداية</h1>
                <p class="text-gray-400 mt-1">إعادة تعيين كلمة المرور</p>
                <div class="mt-4 h-1 w-20 bg-gradient-to-r from-indigo-500 to-purple-600 mx-auto rounded-full"></div>
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" id="step1Dot">1</div>
                <div class="step-line" id="line1"></div>
                <div class="step-dot inactive" id="step2Dot">2</div>
                <div class="step-line" id="line2"></div>
                <div class="step-dot inactive" id="step3Dot">3</div>
            </div>

            <!-- Step 1: Enter Email -->
            <div class="step-panel active" id="step1">
                <h2 class="text-xl font-bold text-white text-center mb-4">أدخل بريدك الإلكتروني</h2>
                <p class="text-gray-400 text-center text-sm mb-6">سنرسل لك رمز التحقق (OTP) لإعادة تعيين كلمة المرور</p>
                <form id="forgotPasswordForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-300 text-sm font-bold mb-2">البريد الإلكتروني</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute right-3 top-3 text-gray-500"></i>
                            <input type="email" id="resetEmail" name="email" required placeholder="البريد الالكتروني"
                                class="w-full pr-10 pl-3 py-2 border border-gray-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-gray-800/50 text-white placeholder-gray-500 transition">
                            <span class="error-message hidden" id="resetEmailError"></span>
                        </div>
                    </div>
                    <div id="resetError" class="hidden bg-red-500/20 border border-red-500 text-red-200 px-4 py-3 rounded relative" role="alert">
                        <span id="resetErrorMessage"></span>
                    </div>
                    <button type="submit" 
                        class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg hover:from-indigo-700 hover:to-purple-700 transform hover:scale-105 transition-all duration-300 shadow-lg">
                        <i class="fas fa-paper-plane ml-2"></i>
                        إرسال رمز التحقق
                    </button>
                </form>
            </div>

            <!-- Step 2: Verify OTP -->
            <div class="step-panel" id="step2">
                <h2 class="text-xl font-bold text-white text-center mb-4">أدخل رمز التحقق</h2>
                <p class="text-gray-400 text-center text-sm mb-6">أدخل الرقم المكون من 6 أرقام الذي تم إرساله إلى بريدك الإلكتروني</p>
                <form id="verifyOTPForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-300 text-sm font-bold mb-2">رمز التحقق (OTP)</label>
                        <div class="relative">
                            <i class="fas fa-shield-alt absolute right-3 top-3 text-gray-500"></i>
                            <input type="text" id="otpCode" name="otp" required placeholder="أدخل الرمز المكون من 6 أرقام" maxlength="6"
                                class="w-full pr-10 pl-3 py-2 border border-gray-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-gray-800/50 text-white placeholder-gray-500 transition text-center text-2xl tracking-widest">
                            <span class="error-message hidden" id="otpError"></span>
                        </div>
                    </div>
                    <div id="otpErrorDiv" class="hidden bg-red-500/20 border border-red-500 text-red-200 px-4 py-3 rounded relative" role="alert">
                        <span id="otpErrorMessage"></span>
                    </div>
                    <button type="submit" 
                        class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg hover:from-indigo-700 hover:to-purple-700 transform hover:scale-105 transition-all duration-300 shadow-lg">
                        <i class="fas fa-check-circle ml-2"></i>
                        تحقق
                    </button>
                    <button type="button" onclick="goToStep(1)" 
                        class="w-full py-2 text-indigo-400 hover:text-indigo-300 transition text-sm">
                        <i class="fas fa-arrow-right ml-1"></i>
                        العودة لإدخال البريد الإلكتروني
                    </button>
                </form>
            </div>

            <!-- Step 3: New Password -->
            <div class="step-panel" id="step3">
                <h2 class="text-xl font-bold text-white text-center mb-4">كلمة مرور جديدة</h2>
                <p class="text-gray-400 text-center text-sm mb-6">أدخل كلمة المرور الجديدة لحسابك</p>
                <form id="resetPasswordForm" class="space-y-4">
                    <input type="hidden" id="resetEmailHidden">
                    <input type="hidden" id="resetOtpHidden">
                    <div>
                        <label class="block text-gray-300 text-sm font-bold mb-2">كلمة المرور الجديدة</label>
                        <div class="password-wrapper">
                            <i class="fas fa-lock absolute right-3 top-3 text-gray-500"></i>
                            <input type="password" id="newPassword" name="password" required placeholder="كلمة المرور الجديدة" minlength="6"
                                class="w-full pr-10 pl-10 py-2 border border-gray-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-gray-800/50 text-white placeholder-gray-500 transition">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('newPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                            <span class="error-message hidden" id="newPasswordError"></span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-300 text-sm font-bold mb-2">تأكيد كلمة المرور</label>
                        <div class="password-wrapper">
                            <i class="fas fa-check-circle absolute right-3 top-3 text-gray-500"></i>
                            <input type="password" id="confirmNewPassword" name="confirmPassword" required placeholder="تأكيد كلمة المرور"
                                class="w-full pr-10 pl-10 py-2 border border-gray-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-gray-800/50 text-white placeholder-gray-500 transition">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmNewPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                            <span class="error-message hidden" id="confirmNewPasswordError"></span>
                        </div>
                    </div>
                    <div id="resetPasswordError" class="hidden bg-red-500/20 border border-red-500 text-red-200 px-4 py-3 rounded relative" role="alert">
                        <span id="resetPasswordErrorMessage"></span>
                    </div>
                    <button type="submit" 
                        class="w-full py-3 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold rounded-lg hover:from-emerald-700 hover:to-teal-700 transform hover:scale-105 transition-all duration-300 shadow-lg">
                        <i class="fas fa-save ml-2"></i>
                        حفظ كلمة المرور الجديدة
                    </button>
                    <button type="button" onclick="goToStep(2)" 
                        class="w-full py-2 text-indigo-400 hover:text-indigo-300 transition text-sm">
                        <i class="fas fa-arrow-right ml-1"></i>
                        العودة لإدخال رمز التحقق
                    </button>
                </form>
            </div>

            <div class="mt-6 text-center">
                <a href="/login" class="text-gray-500 hover:text-indigo-400 transition">
                    <i class="fas fa-arrow-right ml-1"></i>
                    العودة لتسجيل الدخول
                </a>
            </div>
            <div class="mt-4 text-center">
                <a href="/" class="text-gray-500 hover:text-indigo-400 transition text-sm">
                    <i class="fas fa-home ml-1"></i>
                    العودة للرئيسية
                </a>
            </div>
        </div>
    </div>
    <div id="toast" class="fixed top-4 right-4 p-4 rounded-lg shadow-lg transform translate-x-full opacity-0 transition-all duration-300 z-50"></div>
    <script>
        // ============================================
        // PASSWORD TOGGLE FUNCTION
        // ============================================
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ============================================
        // STEP NAVIGATION
        // ============================================
        let currentStep = 1;
        let userEmail = '';
        let userOTP = '';

        function goToStep(step) {
            currentStep = step;
            
            // Hide all panels
            document.querySelectorAll('.step-panel').forEach(el => el.classList.remove('active'));
            
            // Show target panel
            const panel = document.getElementById('step' + step);
            if (panel) panel.classList.add('active');
            
            // Update dots
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('step' + i + 'Dot');
                if (dot) {
                    dot.classList.remove('active', 'completed', 'inactive');
                    if (i === step) {
                        dot.classList.add('active');
                    } else if (i < step) {
                        dot.classList.add('completed');
                    } else {
                        dot.classList.add('inactive');
                    }
                }
            }
            
            // Update lines
            for (let i = 1; i <= 2; i++) {
                const line = document.getElementById('line' + i);
                if (line) {
                    line.classList.remove('completed');
                    if (i < step) {
                        line.classList.add('completed');
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const toast = document.getElementById('toast');

            // ============================================
            // STEP 1: FORGOT PASSWORD (Send OTP)
            // ============================================
            document.getElementById('forgotPasswordForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('resetEmail').value.trim();
                const errorDiv = document.getElementById('resetError');
                const errorMessage = document.getElementById('resetErrorMessage');
                const emailError = document.getElementById('resetEmailError');

                errorDiv.classList.add('hidden');
                emailError.classList.add('hidden');

                if (!email || !email.includes('@')) {
                    emailError.textContent = 'بريد إلكتروني غير صحيح';
                    emailError.classList.remove('hidden');
                    return;
                }

                try {
                    const response = await fetch('/api/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        userEmail = email;
                        showToast('تم إرسال رمز التحقق إلى بريدك الإلكتروني', 'success');
                        goToStep(2);
                    } else {
                        errorMessage.textContent = data.error || 'حدث خطأ';
                        errorDiv.classList.remove('hidden');
                    }
                } catch (error) {
                    errorMessage.textContent = 'حدث خطأ أثناء التواصل مع الخادم';
                    errorDiv.classList.remove('hidden');
                }
            });

            // ============================================
            // STEP 2: VERIFY OTP
            // ============================================
            document.getElementById('verifyOTPForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const otp = document.getElementById('otpCode').value.trim();
                const errorDiv = document.getElementById('otpErrorDiv');
                const errorMessage = document.getElementById('otpErrorMessage');
                const otpError = document.getElementById('otpError');

                errorDiv.classList.add('hidden');
                otpError.classList.add('hidden');

                if (!otp || otp.length !== 6 || !/^\d+$/.test(otp)) {
                    otpError.textContent = 'يرجى إدخال رمز تحقق صحيح مكون من 6 أرقام';
                    otpError.classList.remove('hidden');
                    return;
                }

                // Store OTP for step 3
                userOTP = otp;
                
                // Proceed to step 3 without verifying OTP again (already verified on server)
                // We'll verify again when resetting password
                document.getElementById('resetEmailHidden').value = userEmail;
                document.getElementById('resetOtpHidden').value = userOTP;
                goToStep(3);
                showToast('تم التحقق من الرمز بنجاح', 'success');
            });

            // ============================================
            // STEP 3: RESET PASSWORD
            // ============================================
            document.getElementById('resetPasswordForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('resetEmailHidden').value;
                const otp = document.getElementById('resetOtpHidden').value;
                const password = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmNewPassword').value;
                const errorDiv = document.getElementById('resetPasswordError');
                const errorMessage = document.getElementById('resetPasswordErrorMessage');
                const passwordError = document.getElementById('newPasswordError');
                const confirmError = document.getElementById('confirmNewPasswordError');

                errorDiv.classList.add('hidden');
                passwordError.classList.add('hidden');
                confirmError.classList.add('hidden');

                if (password.length < 6) {
                    passwordError.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                    passwordError.classList.remove('hidden');
                    return;
                }

                if (password !== confirmPassword) {
                    confirmError.textContent = 'كلمات المرور غير متطابقة';
                    confirmError.classList.remove('hidden');
                    return;
                }

                try {
                    const response = await fetch('/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, otp, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showToast('تم إعادة تعيين كلمة المرور بنجاح! جاري تحويلك...', 'success');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        errorMessage.textContent = data.error || 'حدث خطأ';
                        errorDiv.classList.remove('hidden');
                    }
                } catch (error) {
                    errorMessage.textContent = 'حدث خطأ أثناء التواصل مع الخادم';
                    errorDiv.classList.remove('hidden');
                }
            });

            // ============================================
            // OTP INPUT AUTO-FOCUS
            // ============================================
            document.getElementById('otpCode')?.addEventListener('input', function(e) {
                // Allow only digits
                this.value = this.value.replace(/\D/g, '');
                // Auto-submit when 6 digits entered
                if (this.value.length === 6) {
                    document.getElementById('verifyOTPForm').dispatchEvent(new Event('submit'));
                }
            });

            // ============================================
            // TOAST FUNCTION
            // ============================================
            function showToast(message, type = 'success') {
                toast.textContent = message;
                toast.className = 'fixed top-4 right-4 p-4 rounded-lg shadow-lg transform translate-x-0 opacity-100 transition-all duration-300 z-50';
                if (type === 'success') {
                    toast.classList.add('bg-green-600', 'text-white');
                } else {
                    toast.classList.add('bg-red-600', 'text-white');
                }
                setTimeout(() => {
                    toast.classList.add('translate-x-full', 'opacity-0');
                }, 3000);
            }

            // Check if already logged in
            fetch('/api/auth/verify')
                .then(res => res.json())
                .then(data => {
                    if (data.authenticated) {
                        window.location.href = '/';
                    }
                })
                .catch(() => {});
        });
    </script>
</body>
</html>
