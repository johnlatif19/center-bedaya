<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مركز بداية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            direction: rtl;
            background: #0f172a;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #4f46e5, #7c3aed);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #4338ca, #6d28d9);
        }
        input:focus {
            outline: none;
        }
        input:focus-visible {
            outline: 2px solid #4f46e5;
            outline-offset: 2px;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="glass-card p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-block p-3 rounded-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-3xl mb-4">
                    <i class="fas fa-stethoscope"></i>
                </div>
                <h1 class="text-3xl font-bold text-white">مركز بداية</h1>
                <p class="text-gray-400 mt-1">للتدخل المبكر والتأهيل</p>
                <div class="mt-4 h-1 w-20 bg-gradient-to-r from-indigo-500 to-purple-600 mx-auto rounded-full"></div>
            </div>
            <h2 class="text-2xl font-bold text-center text-white mb-6">تسجيل الدخول</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-300 text-sm font-bold mb-2">البريد الإلكتروني</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute right-3 top-3 text-gray-500"></i>
                        <input type="email" id="email" name="email" required placeholder="البريد الالكتروني"
                            class="w-full pr-10 pl-3 py-2 border border-gray-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-gray-800/50 text-white placeholder-gray-500 transition">
                        <span class="error-message hidden" id="emailError"></span>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-300 text-sm font-bold mb-2">كلمة المرور</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute right-3 top-3 text-gray-500"></i>
                        <input type="password" id="password" name="password" required placeholder="كلمة المرور"
                            class="w-full pr-10 pl-3 py-2 border border-gray-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-gray-800/50 text-white placeholder-gray-500 transition">
                        <span class="error-message hidden" id="passwordError"></span>
                    </div>
                </div>
                <div id="formError" class="hidden bg-red-500/20 border border-red-500 text-red-200 px-4 py-3 rounded relative" role="alert">
                    <span id="errorMessage"></span>
                </div>
                <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg hover:from-indigo-700 hover:to-purple-700 transform hover:scale-105 transition-all duration-300 shadow-lg">
                    <i class="fas fa-sign-in-alt ml-2"></i>
                    دخول
                </button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-gray-400">
                    ليس لديك حساب؟
                    <a href="/signup" class="text-indigo-400 font-bold hover:underline">إنشاء حساب</a>
                </p>
            </div>
            <div class="mt-6 text-center">
                <a href="/" class="text-gray-500 hover:text-indigo-400 transition">
                    <i class="fas fa-arrow-right ml-1"></i>
                    العودة للرئيسية
                </a>
            </div>
        </div>
    </div>
    <div id="toast" class="fixed top-4 right-4 p-4 rounded-lg shadow-lg transform translate-x-full opacity-0 transition-all duration-300 z-50"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const errorDiv = document.getElementById('formError');
            const errorMessage = document.getElementById('errorMessage');
            const toast = document.getElementById('toast');

            fetch('/api/auth/verify')
                .then(res => res.json())
                .then(data => {
                    if (data.authenticated) {
                        window.location.href = '/';
                    }
                })
                .catch(() => {});

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                errorDiv.classList.add('hidden');
                document.querySelectorAll('.error-message').forEach(el => {
                    el.classList.add('hidden');
                    el.textContent = '';
                });
                document.querySelectorAll('input').forEach(el => el.classList.remove('border-red-500'));

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                let hasError = false;

                if (!email) {
                    const errorEl = document.getElementById('emailError');
                    errorEl.textContent = 'البريد الإلكتروني مطلوب';
                    errorEl.classList.remove('hidden');
                    document.getElementById('email').classList.add('border-red-500');
                    hasError = true;
                }

                if (!password) {
                    const errorEl = document.getElementById('passwordError');
                    errorEl.textContent = 'كلمة المرور مطلوبة';
                    errorEl.classList.remove('hidden');
                    document.getElementById('password').classList.add('border-red-500');
                    hasError = true;
                }

                if (hasError) return;

                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        showToast('تم تسجيل الدخول بنجاح! جاري تحويلك...', 'success');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 2000);
                    } else {
                        if (data.errors) {
                            data.errors.forEach(err => {
                                const fieldMap = { 'email': 'email', 'password': 'password' };
                                const field = fieldMap[err.path] || 'email';
                                const errorEl = document.getElementById(field + 'Error');
                                if (errorEl) {
                                    errorEl.textContent = err.msg;
                                    errorEl.classList.remove('hidden');
                                    document.getElementById(field).classList.add('border-red-500');
                                }
                            });
                        } else {
                            showError(data.error || 'بيانات الدخول غير صحيحة');
                        }
                    }
                } catch (error) {
                    showError('حدث خطأ أثناء التواصل مع الخادم');
                }
            });

            function showError(message) {
                errorMessage.textContent = message;
                errorDiv.classList.remove('hidden');
            }

            function showToast(message, type = 'success') {
                toast.textContent = message;
                toast.className = 'fixed top-4 right-4 p-4 rounded-lg shadow-lg transform translate-x-0 opacity-100 transition-all duration-300 z-50';
                if (type === 'success') {
                    toast.classList.add('bg-green-600', 'text-white');
                } else {
                    toast.classList.add('bg-red-600', 'text-white');
                }
                setTimeout(() => {
                    toast.classList.add('translate-x-full', 'opacity-0');
                }, 3000);
            }
        });
    </script>
</body>
</html>
